<div class="min-h-[75vh] flex items-center justify-center px-6 py-20">
  <div class="w-full max-w-md">

    <div class="mb-12">
      <app-go-back-button></app-go-back-button>
    </div>

    <div class="mb-12 text-center">
      <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase mb-4">AllMart.</h1>
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Create an account</p>
    </div>

    @if (errorMessage) {
      <div class="bg-red-50 text-red-600 border border-red-100 p-4 mb-8 text-sm text-center font-bold uppercase tracking-wide">
        {{ errorMessage }}
      </div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div class="flex flex-col">
          <label for="firstName" class="text-xs font-bold uppercase tracking-widest text-slate-900 mb-3">First Name</label>
          <input id="firstName" type="text" formControlName="firstName"
                 class="border border-slate-200 px-5 py-3 text-slate-900 text-sm focus:border-slate-900 focus:outline-none transition-colors">
        </div>

        <div class="flex flex-col">
          <label for="lastName" class="text-xs font-bold uppercase tracking-widest text-slate-900 mb-3">Last Name</label>
          <input id="lastName" type="text" formControlName="lastName"
                 class="border border-slate-200 px-5 py-3 text-slate-900 text-sm focus:border-slate-900 focus:outline-none transition-colors">
        </div>
      </div>

      <div class="flex flex-col">
        <label for="email" class="text-xs font-bold uppercase tracking-widest text-slate-900 mb-3">Email Address</label>
        <input id="email" type="email" formControlName="email"
               class="border border-slate-200 px-5 py-3 text-slate-900 text-sm focus:border-slate-900 focus:outline-none transition-colors">
      </div>

      <div class="flex flex-col">
        <label for="password" class="text-xs font-bold uppercase tracking-widest text-slate-900 mb-3">Password</label>
        <input id="password" type="password" formControlName="password"
               class="border border-slate-200 px-5 py-3 text-slate-900 text-sm focus:border-slate-900 focus:outline-none transition-colors">
      </div>

      <button type="submit"
              class="w-full bg-slate-900 text-white px-8 py-4 mt-6 text-sm font-bold uppercase tracking-widest hover:bg-slate-800 transition-colors cursor-pointer shadow-sm">
        Create Account
      </button>

    </form>

    <div class="mt-12 text-center">
      <p class="text-sm text-slate-500">
        Already have an account?
        <a routerLink="/login" class="font-bold text-slate-900 uppercase tracking-widest hover:text-slate-600 transition-colors underline underline-offset-4 ml-2 cursor-pointer">Sign In</a>
      </p>
    </div>

  </div>
</div>
