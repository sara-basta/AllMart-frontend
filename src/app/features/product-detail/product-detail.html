@if (productRes()) {
  <div class="max-w-7xl mx-auto px-6 lg:px-8 py-16 min-h-[75vh]">

    <a routerLink="/catalog" class="group inline-flex items-center text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-slate-900 mb-12 transition-colors cursor-pointer">
      <svg class="w-4 h-4 mr-3 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Back to Catalog
    </a>

    <div class="flex flex-col lg:flex-row gap-16 lg:gap-24 items-start">

      <div class="w-full lg:w-1/2 bg-slate-50 aspect-[4/5] sm:aspect-square flex items-center justify-center relative overflow-hidden">
        @if (productRes()?.imageUrl) {
          <img [src]="productRes()?.imageUrl" [alt]="productRes()?.name" class="absolute inset-0 w-full h-full object-cover" />
        } @else {
          <div class="flex flex-col items-center text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="text-xs font-bold uppercase tracking-widest">No Image</span>
          </div>
        }
      </div>

      <div class="w-full lg:w-1/2 flex flex-col pt-8 lg:pt-12">

        <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter uppercase mb-4">{{ productRes()?.name }}</h1>
        <p class="text-xl font-bold text-slate-500 mb-10">{{ productRes()?.price }} MAD</p>

        <div class="mb-12 border-t border-b border-slate-100 py-8">
          <h3 class="text-xs font-bold uppercase tracking-widest text-slate-900 mb-4">Description</h3>
          <div class="text-sm text-slate-500 leading-relaxed font-light whitespace-pre-line">
            {{ productRes()?.description }}
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 w-full mt-auto">

          <button
          (click)="addToCart()"
           class="flex-1 bg-transparent border border-slate-900 text-slate-900 px-8 py-4 text-xs font-bold uppercase tracking-widest hover:bg-slate-50 transition-colors flex items-center justify-center cursor-pointer">
            Add to Cart
          </button>

          <button 
          [routerLink]="['/cart/checkout']" 
          [queryParams]="{ productId: productRes()?.id }"
          class="flex-1 bg-slate-900 border border-slate-900 text-white px-8 py-4 text-xs font-bold uppercase tracking-widest hover:bg-slate-800 transition-colors flex items-center justify-center cursor-pointer shadow-sm">
            Buy Now
          </button>

        </div>
      </div>

    </div>
  </div>
} @else {
  <div class="min-h-[75vh] flex flex-col items-center justify-center text-slate-400">
    <svg class="animate-spin h-8 w-8 text-slate-900 mb-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <span class="text-xs font-bold uppercase tracking-widest">Loading Product...</span>
  </div>
}
