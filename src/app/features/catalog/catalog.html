<div class="max-w-7xl mx-auto px-6 lg:px-8 py-16">

  <div class="mb-12 border-b border-slate-100 pb-8 flex items-baseline justify-between">
    <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">Catalog.</h1>
    <span class="text-xs font-bold uppercase tracking-widest text-slate-400">{{ productList().length }} Results</span>
  </div>

  <div class="flex flex-col lg:flex-row gap-16">

    <aside class="w-full lg:w-64 flex-shrink-0">
      <div class="sticky top-32"> <div class="mb-10">
        <h2 class="text-xs font-bold text-slate-900 uppercase tracking-widest mb-4">Category</h2>
        <div class="relative">
          <select
            [(ngModel)]="CategoryId"
            (change)="applyFilters()"
            class="w-full border border-slate-200 px-5 py-3 text-slate-900 text-xs font-bold uppercase tracking-widest focus:border-slate-900 focus:outline-none transition-colors cursor-pointer appearance-none bg-transparent rounded-none"
          >
            <option [ngValue]="null">All Categories</option>
            @for (cat of categoryList(); track cat.id) {
              <option [ngValue]="cat.id">{{ cat.name }}</option>
            }
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-900">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
      </div>

        <div class="mb-10">
          <h2 class="text-xs font-bold text-slate-900 uppercase tracking-widest mb-4">Price Range</h2>

          <div class="flex flex-col gap-4">
            <input
              type="number"
              [(ngModel)]="minPrice"
              (keyup.enter)="applyFilters()"
              placeholder="MIN PRICE (MAD)"
              class="w-full border border-slate-200 px-5 py-3 text-slate-900 text-xs font-bold uppercase tracking-widest focus:border-slate-900 focus:outline-none transition-colors rounded-none placeholder-slate-400"
            >
            <input
              type="number"
              [(ngModel)]="maxPrice"
              (keyup.enter)="applyFilters()"
              placeholder="MAX PRICE (MAD)"
              class="w-full border border-slate-200 px-5 py-3 text-slate-900 text-xs font-bold uppercase tracking-widest focus:border-slate-900 focus:outline-none transition-colors rounded-none placeholder-slate-400"
            >
            <button (click)="applyFilters()" class="w-full bg-slate-900 text-white px-8 py-4 mt-2 text-xs font-bold uppercase tracking-widest hover:bg-slate-800 transition-colors cursor-pointer shadow-sm border-none">
              Apply Filters
            </button>
          </div>
        </div>

      </div>
    </aside>

    <main class="flex-1">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
        @for (item of productList(); track item.id) {
          <app-product-card [product]="item"></app-product-card>
        } @empty {
          <div class="col-span-full py-32 text-center border border-slate-100 flex flex-col items-center justify-center">
            <p class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-6">No products found matching your criteria.</p>
            <button (click)="minPrice=null; maxPrice=null; CategoryId=null; applyFilters()" class="text-xs font-bold uppercase tracking-widest text-slate-900 underline underline-offset-4 hover:text-slate-500 transition-colors cursor-pointer bg-transparent border-none">
              Clear all filters
            </button>
          </div>
        }
      </div>
    </main>

  </div>
</div>
