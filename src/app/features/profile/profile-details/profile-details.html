<section>
  <div class="flex items-end justify-between mb-6">
    <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Personal Details</h2>
    @if (!isEditing) {
      <button (click)="toggleEdit()" class="hidden md:block text-[10px] font-semibold text-slate-900 uppercase tracking-widest hover:text-slate-500 transition-colors cursor-pointer bg-transparent border-none">
        Edit Profile &rarr;
      </button>
    }
  </div>

  @if (isEditing) {
    <form [formGroup]="profileForm" (ngSubmit)="submit()" class="grid grid-cols-1 md:grid-cols-2 gap-4 border border-slate-200 p-6 bg-slate-50">
      <div class="space-y-2">
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest">First Name</label>
        <input type="text" formControlName="firstName" class="w-full p-3 bg-white border border-slate-200 text-sm focus:outline-none focus:border-slate-900 transition-colors">
      </div>
      <div class="space-y-2">
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest">Last Name</label>
        <input type="text" formControlName="lastName" class="w-full p-3 bg-white border border-slate-200 text-sm focus:outline-none focus:border-slate-900 transition-colors">
      </div>
      <div class="md:col-span-2 space-y-2 opacity-50">
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest">Email Address</label>
        <input type="text" [value]="currentUser().email" disabled class="w-full p-3 bg-slate-100 border border-slate-200 text-sm cursor-not-allowed">
      </div>
      <div class="md:col-span-2 flex justify-end gap-4 mt-4 pt-4 border-t border-slate-200">
        <button type="button" (click)="toggleEdit()" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-slate-900 cursor-pointer bg-transparent border-none">Cancel</button>
        <button type="submit" [disabled]="profileForm.invalid || isSaving()" class="bg-slate-900 text-white px-6 py-2 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-colors cursor-pointer border-none disabled:opacity-50">
          {{ isSaving() ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="border border-slate-200 p-5 bg-slate-50 group hover:border-slate-900 transition-colors">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">First Name</p>
        <p class="text-sm font-bold text-slate-900 uppercase tracking-tight">{{ currentUser().firstName }}</p>
      </div>
      <div class="border border-slate-200 p-5 bg-slate-50 group hover:border-slate-900 transition-colors">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Last Name</p>
        <p class="text-sm font-bold text-slate-900 uppercase tracking-tight">{{ currentUser().lastName }}</p>
      </div>
      <div class="md:col-span-2 border border-slate-200 p-5 bg-slate-50 group hover:border-slate-900 transition-colors">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Email Address</p>
        <p class="text-sm font-bold text-slate-900 tracking-tight">{{ currentUser().email }}</p>
      </div>
    </div>
  }
</section>
