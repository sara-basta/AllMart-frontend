<div class="max-w-2xl mx-auto py-16 px-4">
  <div class="mb-12 border-b border-slate-100 pb-8">
    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Add New Address</h1>
  </div>

  <form [formGroup]="addressForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-10">

    <div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Street Address</p>
      <input formControlName="street" type="text"
             class="w-full border-b border-slate-200 py-3 text-lg font-medium text-slate-900 focus:border-slate-900 focus:outline-none transition-colors placeholder-slate-200"
             placeholder="123 Avenue Mohammed V">
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-10">
      <div>
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">City</p>
        <input formControlName="city" type="text"
               class="w-full border-b border-slate-200 py-3 text-lg font-medium text-slate-900 focus:border-slate-900 focus:outline-none transition-colors placeholder-slate-200"
               placeholder="Rabat">
      </div>
      <div>
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Zip Code</p>
        <input formControlName="zipCode" type="text"
               class="w-full border-b border-slate-200 py-3 text-lg font-medium text-slate-900 focus:border-slate-900 focus:outline-none transition-colors placeholder-slate-200"
               placeholder="10000">
      </div>
    </div>

    <div class="flex items-center gap-8 pt-6">
      <button type="submit" [disabled]="addressForm.invalid"
              class="text-xs font-bold text-slate-900 tracking-widest uppercase hover:text-slate-500 transition-colors cursor-pointer disabled:text-slate-300">
        Save Address
      </button>
      <button type="button" (click)="cancel()"
              class="text-xs font-bold text-slate-400 tracking-widest uppercase hover:text-slate-900 transition-colors cursor-pointer">
        Cancel
      </button>
    </div>
  </form>
</div>
