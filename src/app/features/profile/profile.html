<div class="max-w-7xl mx-auto px-6 lg:px-8 py-12">
  <div class="mb-10 border-b border-slate-100 pb-6 flex items-baseline justify-between">
    <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">My Account.</h1>
    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Welcome Back</span>
  </div>

  <div class="flex flex-col lg:flex-row gap-12">
    <aside class="w-full lg:w-56 flex-shrink-0">
      <div class="sticky top-32">
        <h2 class="text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-3">Navigation</h2>
        <nav class="flex flex-col gap-3">
          <a (click)="activeTab.set('profile')"
             [class.bg-slate-900]="activeTab() === 'profile'"
             [class.text-white]="activeTab() === 'profile'"
             [class.border-slate-900]="activeTab() === 'profile'"
             [class.bg-transparent]="activeTab() !== 'profile'"
             [class.text-slate-900]="activeTab() !== 'profile'"
             [class.border-slate-200]="activeTab() !== 'profile'"
             class="w-full border px-4 py-2.5 text-[10px] font-bold uppercase tracking-widest hover:border-slate-900 transition-colors cursor-pointer text-center block">
            Profile & Data
          </a>

          <a (click)="activeTab.set('orders')"
             [class.bg-slate-900]="activeTab() === 'orders'"
             [class.text-white]="activeTab() === 'orders'"
             [class.border-slate-900]="activeTab() === 'orders'"
             [class.bg-transparent]="activeTab() !== 'orders'"
             [class.text-slate-900]="activeTab() !== 'orders'"
             [class.border-slate-200]="activeTab() !== 'orders'"
             class="w-full border px-4 py-2.5 text-[10px] font-bold uppercase tracking-widest hover:border-slate-900 transition-colors cursor-pointer text-center block">
            Order History
          </a>

          <a (click)="activeTab.set('security')"
             [class.bg-slate-900]="activeTab() === 'security'"
             [class.text-white]="activeTab() === 'security'"
             [class.border-slate-900]="activeTab() === 'security'"
             [class.bg-transparent]="activeTab() !== 'security'"
             [class.text-slate-900]="activeTab() !== 'security'"
             [class.border-slate-200]="activeTab() !== 'security'"
             class="w-full border px-4 py-2.5 text-[10px] font-bold uppercase tracking-widest hover:border-slate-900 transition-colors cursor-pointer text-center block">
            Security
          </a>
        </nav>
      </div>
    </aside>

    <main class="flex-1 max-w-4xl">
      @if (activeTab() === 'profile') {
        <div class="flex flex-col gap-12">
          @if (user.currentUserSignal(); as currentUser) {
            <app-profile-details 
              [currentUser]="currentUser"
              [isSaving]="isSavingProfile()"
              (onSave)="handleSaveProfile($event)">
            </app-profile-details>
          }
          
          <app-address-manager 
            [addresses]="userAddresses() || []"
            (onUpdate)="handleUpdateAddress($event)"
            (onDelete)="handleDeleteAddress($event)">
          </app-address-manager>
        </div>
      }

      @if (activeTab() === 'orders') {
        <app-order-history
          [orders]="orders()"
          [selectedOrder]="selectedOrder()"
          [isLoading]="isLoadingOrders()"
          [currentPage]="currentPage()"
          [totalPages]="totalPages()"
          [totalElements]="totalElements()"
          (onViewOrder)="handleViewOrder($event)"
          (onCancelOrder)="handleCancelOrder($event)"
          (onBackToHistory)="selectedOrder.set(null)"
          (onPageChange)="loadOrderHistory($event)">
        </app-order-history>
      }

      @if (activeTab() === 'security') {
        <app-security-settings
          [isChanging]="isChangingPassword()"
          [successMsg]="passwordSuccessMsg()"
          [errorMsg]="passwordErrorMsg()"
          (onSubmit)="handleChangePassword($event)">
        </app-security-settings>
      }
    </main>
  </div>
</div>
