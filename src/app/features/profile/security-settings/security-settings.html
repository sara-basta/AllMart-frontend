<section class="animate-in fade-in duration-300">
  <div class="flex items-end justify-between mb-8">
    <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Account Security</h2>
  </div>
  
  <div class="max-w-md border border-slate-200 p-6 bg-slate-50">
    <h3 class="text-[10px] font-black uppercase tracking-widest mb-6 text-slate-900">Change Password</h3>
    
    <form [formGroup]="passwordForm" (ngSubmit)="submit()" class="space-y-6">
      
      @if (successMsg()) {
        <div class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 text-[10px] font-bold uppercase tracking-widest">
          {{ successMsg() }}
        </div>
      }
      @if (errorMsg()) {
        <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 text-[10px] font-bold uppercase tracking-widest">
          {{ errorMsg() }}
        </div>
      }

      <div class="space-y-2">
        <label class="block text-[10px] font-bold uppercase text-slate-900 tracking-widest">Current Password</label>
        <input type="password" formControlName="oldPassword" class="w-full p-3 bg-white border border-slate-200 text-sm focus:border-slate-900 focus:outline-none transition-colors">
      </div>

      <div class="space-y-2">
        <label class="block text-[10px] font-bold uppercase text-slate-900 tracking-widest">New Password <span class="text-[9px] text-slate-400 lowercase normal-case ml-2 tracking-normal">(min 8 chars)</span></label>
        <input type="password" formControlName="newPassword" class="w-full p-3 bg-white border border-slate-200 text-sm focus:border-slate-900 focus:outline-none transition-colors">
      </div>

      <div class="space-y-2">
        <label class="block text-[10px] font-bold uppercase text-slate-900 tracking-widest">Confirm New Password</label>
        <input type="password" formControlName="confirmPassword" class="w-full p-3 bg-white border border-slate-200 text-sm focus:border-slate-900 focus:outline-none transition-colors">
        
        @if (passwordForm.hasError('mismatch') && passwordForm.get('confirmPassword')?.touched) {
          <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest mt-2">Passwords do not match.</p>
        }
      </div>

      <div class="pt-4 border-t border-slate-200">
        <button type="submit" [disabled]="passwordForm.invalid || isChanging()" class="w-full bg-slate-900 text-white py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed border-none cursor-pointer">
          {{ isChanging() ? 'Encrypting...' : 'Update Password' }}
        </button>
      </div>
    </form>
  </div>
</section>
