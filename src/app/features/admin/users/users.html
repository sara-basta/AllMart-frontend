<div class="bg-white p-8 border border-slate-100 shadow-sm">
  <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter mb-8">User Management</h2>

  <div class="mb-12 p-6 bg-slate-50 border border-slate-200">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <input type="text" [(ngModel)]="newUser.firstName" placeholder="First Name" class="border-2 border-white p-3 text-sm focus:border-slate-900 focus:outline-none bg-white">
      <input type="text" [(ngModel)]="newUser.lastName" placeholder="Last Name" class="border-2 border-white p-3 text-sm focus:border-slate-900 focus:outline-none bg-white">
      <input type="email" [(ngModel)]="newUser.email" placeholder="Email" class="border-2 border-white p-3 text-sm focus:border-slate-900 focus:outline-none bg-white">
    </div>
    <div class="flex gap-4 mb-6">
      <input type="password" [(ngModel)]="newUser.password" placeholder="Password" class="flex-1 border-2 border-white p-3 text-sm focus:border-slate-900 focus:outline-none bg-white">
      <select [(ngModel)]="newUser.role" class="border-2 border-white p-3 text-sm focus:border-slate-900 focus:outline-none bg-white">
        <option value="CUSTOMER">CUSTOMER</option>
        <option value="ADMIN">ADMIN</option>
      </select>
    </div>
    <button (click)="createUser()" class="bg-slate-900 text-white px-8 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-colors cursor-pointer border-none">
      Add New User
    </button>
  </div>

  <div class="flex justify-between items-end mb-6">
    <div class="max-w-xs w-full">
      <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Search by ID</label>
      <div class="relative">
        <input type="number" [(ngModel)]="searchId" (keyup.enter)="onSearch()" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none bg-slate-50">
        <button (click)="onSearch()" class="absolute right-3 top-3 text-slate-400 hover:text-slate-900 bg-transparent border-none cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  @if (isLoading()) {
    <div class="py-12 flex justify-center"><div class="w-8 h-8 border-4 border-slate-200 border-t-slate-900 rounded-full animate-spin"></div></div>
  } @else {
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b-2 border-slate-900">
            <th class="py-4 px-4 text-[10px] font-bold text-slate-900 uppercase tracking-widest">ID</th>
            <th class="py-4 px-4 text-[10px] font-bold text-slate-900 uppercase tracking-widest">Full Name</th>
            <th class="py-4 px-4 text-[10px] font-bold text-slate-900 uppercase tracking-widest">Email</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users(); track user.id) {
            <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
              <td class="py-4 px-4 text-sm font-medium text-slate-400">#{{ user.id }}</td>
              <td class="py-4 px-4 text-sm font-bold text-slate-900">{{ user.firstName }} {{ user.lastName }}</td>
              <td class="py-4 px-4 text-sm text-slate-600">{{ user.email }}</td>
            </tr>
          } @empty {
            <tr><td colspan="3" class="py-12 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">No users found.</td></tr>
          }
        </tbody>
      </table>
    </div>

    <div class="mt-8 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-slate-500">
      <span>Total: {{ totalElements() }} users</span>
      <div class="flex gap-4">
        <button [disabled]="currentPage() === 0" (click)="changePage(currentPage() - 1)" class="hover:text-slate-900 disabled:opacity-30 cursor-pointer border-none bg-transparent p-0">Previous</button>
        <span class="text-slate-900">Page {{ currentPage() + 1 }} / {{ totalPages() || 1 }}</span>
        <button [disabled]="currentPage() >= totalPages() - 1" (click)="changePage(currentPage() + 1)" class="hover:text-slate-900 disabled:opacity-30 cursor-pointer border-none bg-transparent p-0">Next</button>
      </div>
    </div>
  }
</div>
