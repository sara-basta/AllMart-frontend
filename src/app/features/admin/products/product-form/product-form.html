<div class="max-w-3xl mx-auto bg-white p-8 border border-slate-100 shadow-sm">
  
  <div class="flex items-center gap-4 mb-8">
    <a routerLink="/admin/products" class="text-slate-400 hover:text-slate-900 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
    </a>
    <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">
      {{ isEditMode() ? 'Edit Product' : 'Create New Product' }}
    </h2>
  </div>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Product Name</label>
        <input type="text" formControlName="name" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white">
        @if (productForm.get('name')?.touched && productForm.get('name')?.invalid) {
          <span class="text-[10px] font-bold text-red-500 uppercase tracking-widest mt-1 block">Name is required</span>
        }
      </div>

      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Category</label>
        <select formControlName="categoryId" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white">
          <option [ngValue]="null" disabled>Select a category</option>
          @for (category of categories(); track category.id) {
            <option [value]="category.id">{{ category.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Price (MAD)</label>
        <input type="number" formControlName="price" step="0.01" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white">
      </div>

      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Initial Stock</label>
        <input type="number" formControlName="stockQuantity" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white">      </div>
    </div>

    <div>
      <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Description</label>
      <textarea formControlName="description" rows="4" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white resize-none"></textarea>
    </div>

    <!-- <div>
      <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Image URL (Temp)</label>
      <input type="text" formControlName="imageUrl" placeholder="https://..." class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white">
      <p class="text-[10px] text-slate-400 mt-2 tracking-widest uppercase">We will replace this with a Cloudinary file upload tomorrow.</p>
    </div> -->

    <div class="pt-6 border-t border-slate-100 flex justify-end">
      <button type="submit" [disabled]="isSubmitting() || productForm.invalid" class="bg-slate-900 text-white px-8 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-colors disabled:opacity-50 cursor-pointer">
        {{ isSubmitting() ? 'Saving...' : 'Save Product' }}
      </button>
    </div>

  </form>
</div>
