<div class="max-w-3xl mx-auto bg-white p-8 border border-slate-100 shadow-sm">
  
  <div class="flex items-center gap-4 mb-8">
    <a routerLink="/admin/products" class="text-slate-400 hover:text-slate-900 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
    </a>
    <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">
      {{ isEditMode() ? 'Edit Product' : 'Create New Product' }}
    </h2>
  </div>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Product Name</label>
        <input type="text" formControlName="name" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white">
      </div>

      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Category</label>
        <select formControlName="categoryId" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white">
          <option [ngValue]="null" disabled>Select a category</option>
          @for (category of categories(); track category.id) {
            <option [value]="category.id">{{ category.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Price (MAD)</label>
        <input type="number" formControlName="price" step="0.01" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white">
      </div>

      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Stock Quantity</label>
        <input type="number" formControlName="stockQuantity" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white">
      </div>
    </div>

    <div>
      <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Description</label>
      <textarea formControlName="description" rows="4" class="w-full border-2 border-slate-100 p-3 text-sm focus:border-slate-900 focus:outline-none transition-colors bg-slate-50 focus:bg-white resize-none"></textarea>
    </div>

    <div class="space-y-4">
      <div class="flex justify-between items-end">
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest">Product Images</label>
        <span class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">First image is the main thumbnail</span>
      </div>
      
      <div class="flex flex-wrap gap-4 items-start">
        
        @for (url of uploadedImageUrls(); track url; let i = $index) {
          <div class="relative w-24 h-24 border-2 border-slate-200 group overflow-hidden">
            <img [src]="url" class="w-full h-full object-cover">
            
            <button type="button" (click)="removeImage(i)" class="absolute top-1 right-1 bg-red-600/90 text-white w-5 h-5 flex items-center justify-center rounded-sm opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer border-none text-[10px]">
              ✕
            </button>

            @if (i === 0) {
              <div class="absolute bottom-0 left-0 right-0 bg-slate-900/90 text-white text-[8px] text-center uppercase tracking-widest font-bold py-1">
                Main
              </div>
            }
          </div>
        }

        <div (click)="fileInput.click()" 
            class="w-24 h-24 border-2 border-dashed border-slate-300 flex flex-col items-center justify-center cursor-pointer hover:border-slate-900 hover:text-slate-900 transition-colors bg-slate-50 text-slate-400">
          
          @if (isUploading()) {
            <div class="w-4 h-4 border-2 border-slate-200 border-t-slate-900 rounded-full animate-spin mb-1"></div>
            <span class="text-[8px] font-bold uppercase tracking-widest">Uploading</span>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 mb-1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            <span class="text-[8px] font-bold uppercase tracking-widest">Add Image</span>
          }
        </div>

        <input #fileInput type="file" multiple (change)="onFilesSelected($event)" accept="image/*" class="hidden">

      </div>
    </div>

    <div class="pt-6 border-t border-slate-100 flex justify-end">
      <button type="submit" [disabled]="isSubmitting() || productForm.invalid" class="bg-slate-900 text-white px-8 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-colors disabled:opacity-50 cursor-pointer">
        {{ isSubmitting() ? 'Saving...' : 'Save Product' }}
      </button>
    </div>

  </form>
</div>
