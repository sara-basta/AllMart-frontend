<div class="bg-white p-8 border border-slate-100 shadow-sm">
  <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter mb-8">Category Management</h2>

  <div class="mb-10 p-6 bg-slate-50 border border-slate-200">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Name</label>
        <input type="text" [(ngModel)]="newCategory.name" class="w-full border-2 border-white p-3 text-sm focus:border-slate-900 focus:outline-none bg-white">
      </div>
      <div>
        <label class="block text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-2">Description</label>
        <input type="text" [(ngModel)]="newCategory.description" class="w-full border-2 border-white p-3 text-sm focus:border-slate-900 focus:outline-none bg-white">
      </div>
    </div>
    <button (click)="createCategory()" class="bg-slate-900 text-white px-8 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-colors cursor-pointer">
      Create Category
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b-2 border-slate-900">
          <th class="py-4 px-4 text-[10px] font-bold text-slate-900 uppercase tracking-widest">Name</th>
          <th class="py-4 px-4 text-[10px] font-bold text-slate-900 uppercase tracking-widest">Description</th>
          <th class="py-4 px-4 text-[10px] font-bold text-slate-900 uppercase tracking-widest text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (cat of categories(); track cat.id) {
          <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
            <td class="py-4 px-4">
              @if (editingId() === cat.id) {
                <input type="text" [(ngModel)]="editForm.name" class="border-b border-slate-900 text-sm font-bold focus:outline-none bg-transparent w-full">
              } @else {
                <span class="text-sm font-bold text-slate-900">{{ cat.name }}</span>
              }
            </td>
            <td class="py-4 px-4">
              @if (editingId() === cat.id) {
                <input type="text" [(ngModel)]="editForm.description" class="border-b border-slate-900 text-sm focus:outline-none bg-transparent w-full">
              } @else {
                <span class="text-sm text-slate-500">{{ cat.description }}</span>
              }
            </td>
            <td class="py-4 px-4 text-right space-x-4">
              @if (editingId() === cat.id) {
                <button (click)="saveEdit(cat.id)" class="text-[10px] font-bold text-green-600 uppercase tracking-widest hover:underline">Save</button>
                <button (click)="editingId.set(null)" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:underline">Cancel</button>
              } @else {
                <button (click)="startEdit(cat)" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest hover:underline">Edit</button>
                <button (click)="deleteCategory(cat.id)" class="text-[10px] font-bold text-red-600 uppercase tracking-widest hover:underline">Delete</button>
              }
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
