<div class="group relative flex flex-col gap-4">

  <a routerLink="/products/{{product.id}}" class="relative aspect-[4/5] w-full bg-slate-50 overflow-hidden cursor-pointer block">

    @if (product.imageUrl) {
      <img
        [src]="product.imageUrl"
        [alt]="product.name"
        class="w-full h-full object-cover mix-blend-multiply group-hover:scale-105 transition-transform duration-700 ease-out"
      />
    } @else {
      <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mb-2 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
    }

    <button
      (click)="onAddToCart($event)"
      class="absolute bottom-0 left-0 w-full translate-y-full opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300 bg-slate-900 text-white text-xs font-bold uppercase tracking-widest px-6 py-4 hover:bg-slate-800 border-none cursor-pointer"
    >
      + Quick Add
    </button>
  </a>

  <div class="flex flex-col gap-1 px-1">
    <a routerLink="/products/{{product.id}}" class="text-xs font-bold text-slate-900 uppercase tracking-widest truncate hover:text-slate-500 transition-colors cursor-pointer">
      {{ product.name }}
    </a>
    <span class="text-xs font-bold text-slate-500">{{ product.price }} MAD</span>
  </div>

</div>
