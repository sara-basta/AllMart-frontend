<div class="group relative flex flex-col gap-4">

  <a routerLink="/products/{{product.id}}" class="relative aspect-[4/5] w-full bg-slate-50 overflow-hidden cursor-pointer block">

    @if (product.imageUrl) {
      <img
        [src]="product.imageUrl"
        [alt]="product.name"
        class="w-full h-full object-cover mix-blend-multiply group-hover:scale-105 transition-transform duration-700 ease-out"
      />
    } @else {
      <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mb-2 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
    }

    <button
      (click)="onAddToCart($event)"
      class="absolute bottom-0 left-0 w-full translate-y-full opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300 bg-slate-900 text-white text-xs font-bold uppercase tracking-widest px-6 py-4 hover:bg-slate-800 border-none cursor-pointer"
    >
      + Quick Add
    </button>
    <button (click)="onWishlistClick($event)" class="absolute top-3 right-3 p-2 bg-white rounded-full shadow-sm hover:scale-110 transition-transform cursor-pointer z-10 border-none">
      <svg xmlns="http://www.w3.org/2000/svg" 
          [attr.fill]="wishlist.isInWishlist(product.id) ? 'currentColor' : 'none'"
          [class.text-red-600]="wishlist.isInWishlist(product.id)"
          [class.text-slate-300]="!wishlist.isInWishlist(product.id)"
          viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
      </svg>
    </button>
  </a>

  <div class="flex flex-col gap-1 px-1">
    <a routerLink="/products/{{product.id}}" class="text-xs font-bold text-slate-900 uppercase tracking-widest truncate hover:text-slate-500 transition-colors cursor-pointer">
      {{ product.name }}
    </a>

    @if (product.reviewCount && product.reviewCount > 0) {
      <div class="flex items-center gap-1.5 mt-0.5">
        <div class="flex items-center gap-0.5">
          @for (star of [1, 2, 3, 4, 5]; track star) {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" 
                 class="w-3 h-3" 
                 [ngClass]="star <= (product.averageRating || 0) ? 'text-slate-900' : 'text-slate-200'">
              <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" />
            </svg>
          }
        </div>
        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">({{ product.reviewCount }})</span>
      </div>
    }

    <span class="text-xs font-bold text-slate-500 mt-0.5">{{ product.price }} MAD</span>
  </div>

</div>
